<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
body,html { width:100%; height:100%; margin:0; overflow:hidden; }
#app { width:100%; height:100%; }
</style>
</head>
<body>
<div id="app">
  <div class="cover" v-if="showCover" style="background:linear-gradient(160deg,#1a4d2e,#48bb78);width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;color:white;">
    <h1>绿美怀集</h1>
    <p>广东省 · 肇庆市 · 怀集县</p>
    <button @click="showCover=false" style="padding:14px 44px;border-radius:50px;background:#2f855a;color:white;border:none;cursor:pointer;font-size:1.1rem;">进 入 网 页</button>
  </div>
  <div v-else style="width:100%;height:100%;position:relative;">
    <div id="map" style="width:100%;height:100%;"></div>
  </div>
</div>
<script>
const { createApp } = Vue;
createApp({
  data() {
    return {
      showCover: true,
      map: null,
    };
  },
  watch: {
    showCover(val) {
      if (!val) {
        this.$nextTick(() => {
          this.map = L.map('map').setView([23.934, 112.185], 12);
          L.tileLayer('https://webrd01.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
            maxZoom: 18,
          }).addTo(this.map);
        });
      }
    },
  },
}).mount('#app');
</script>
</body>
</html>
