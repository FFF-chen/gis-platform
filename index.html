<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>绿美怀集</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    
    <style>
        body, html, #app { margin: 0; padding: 0; height: 100%; width: 100%; font-family: -apple-system, sans-serif; overflow: hidden; }
        
        /* 欢迎页保留不变 */
        .cover-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #1a365d 0%, #1c5235 100%); z-index: 9999; display: flex; justify-content: center; align-items: center; color: white; }
        .cover-content { background: rgba(255,255,255,0.1); padding: 50px; border-radius: 20px; backdrop-filter: blur(10px); text-align: center; }
        .enter-btn { background: #2f855a; color: white; border: none; padding: 15px 40px; border-radius: 30px; cursor: pointer; font-size: 18px; }

        /* 主系统样式 */
        .main-system { display: flex; width: 100%; height: 100%; }
        #map-container { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }

        /* 图层按钮：带“图层”字样 */
        .layer-btn { 
            position: absolute; top: 15px; right: 20px; z-index: 1000; 
            background: white; padding: 8px 15px; border-radius: 6px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.2); cursor: pointer; display: flex; align-items: center; gap: 5px;
        }

        /* 浮动面板：仿照图二风格 */
        .layer-switcher-panel {
            position: absolute; top: 60px; right: 20px; z-index: 1000;
            background: white; padding: 15px; border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 220px;
        }
        .layer-option { display: flex; align-items: center; gap: 10px; padding: 10px; cursor: pointer; border-radius: 5px; }
        .layer-option:hover { background: #f7fafc; }
        .layer-thumb { width: 50px; height: 50px; border-radius: 4px; border: 1px solid #ddd; }
        .active-text { color: #2f855a; font-weight: bold; }
    </style>
</head>
<body>

<div id="app">
    <div class="cover-page" v-if="showCover">
        <div class="cover-content">
            <h1>绿美怀集</h1>
            <button class="enter-btn" @click="showCover = false; $nextTick(initMap)">进入网页</button>
        </div>
    </div>

    <div class="main-system" v-else>
        <div id="map-container">
            <div id="map"></div>
            
            <div class="layer-btn" @click="showLayerPanel = !showLayerPanel">
                <span>📋</span> 图层
            </div>

            <div class="layer-switcher-panel" v-if="showLayerPanel">
                <div class="layer-option" @click="changeBaseLayer('vector')">
                    <img class="layer-thumb" src="https://webst01.is.autonavi.com/appmaptile?style=8&x=3347&y=1794&z=12" alt="矢量">
                    <span :class="{'active-text': activeBaseLayer === 'vector'}">电子地图</span>
                </div>
                <div class="layer-option" @click="changeBaseLayer('satellite')">
                    <img class="layer-thumb" src="https://webst01.is.autonavi.com/appmaptile?style=6&x=3347&y=1794&z=12" alt="卫星">
                    <span :class="{'active-text': activeBaseLayer === 'satellite'}">卫星影像</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        data() {
            return {
                showCover: true,
                showLayerPanel: false,
                activeBaseLayer: 'vector',
                map: null,
                vectorLayer: null,
                satelliteLayer: null
            }
        },
        methods: {
            initMap() {
                this.map = L.map('map').setView([23.934, 112.185], 11);
                this.vectorLayer = L.tileLayer('https://webrd01.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}').addTo(this.map);
                this.satelliteLayer = L.tileLayer('https://webst01.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}');
            },
            changeBaseLayer(type) {
                if (type === 'vector') {
                    this.map.removeLayer(this.satelliteLayer);
                    this.vectorLayer.addTo(this.map);
                } else {
                    this.map.removeLayer(this.vectorLayer);
                    this.satelliteLayer.addTo(this.map);
                }
                this.activeBaseLayer = type;
                this.showLayerPanel = false; // 点击后自动收起面板
            }
        }
    }).mount('#app');
</script>
</body>
</html>
